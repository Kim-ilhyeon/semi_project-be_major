spring.application.name=easycoding


spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp


spring.datasource.url=jdbc:mysql://localhost:3306/sample?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=spring
spring.datasource.password=spring
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


mybatis.type-aliases-package=com.kh.semi.easycoding.common.dto
mybatis.mapper-locations=classpath:mappers/**/*.xml

mybatis.configuration.map-underscore-to-camel-case=true


